<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CV Viewer</title>

  <!-- PDF export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
      background: #f5f5f5;
      color: #222;
    }

    .card {
      background: white;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    #cv {
      overflow: visible !important;
    }

    h1, h2 {
      margin: 0;
    }

    h2 {
      margin-top: 28px;
      padding-bottom: 6px;
      border-bottom: 2px solid #eee;
    }

    /* HEADER */
    .header {
      display: flex;
      gap: 18px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .avatar {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .main-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .name-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }

    .name-row h1 {
      font-size: 24px;
    }

    .position {
      font-size: 13px;
      padding: 3px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
    }

    .contact-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 13px;
    }

    .contact-row a,
    .contact-row span {
      background: #f3f4f6;
      padding: 4px 8px;
      border-radius: 8px;
      text-decoration: none;
      color: #444;
    }

    .contact-row a:hover {
      background: #e5e7eb;
    }

    /* CONTENT */
    .item {
      margin-bottom: 18px;
      page-break-inside: avoid;
    }

    .dates {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      background: #eef2ff;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 13px;
    }

    ul {
      padding-left: 18px;
    }

    p {
      margin: 8px 0;
      line-height: 1.5;
    }

    a {
      color: #2563eb;
    }

    /* FLOATING PDF BUTTON */
    .pdf-btn {
      position: fixed;
      right: 20px;
      bottom: 20px;
      background: #111827;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      z-index: 999;
    }

    .pdf-btn:hover {
      background: #374151;
    }

    /* PDF mode */
    @media print {
      body {
        background: white !important;
      }

      .card {
        box-shadow: none !important;
      }

      .pdf-btn {
        display: none !important;
      }
    }
  </style>
</head>

<body>

  <div class="card" id="cv">
    Loading...
  </div>

  <button class="pdf-btn" onclick="exportPDF()">
    Download PDF
  </button>

  <script>
    function section(title, content) {
      if (!content || content.trim().length === 0) return '';
      return `<h2>${title}</h2>${content}`;
    }

    function formatDate(date) {
      if (!date) return 'Present';

      return new Date(date).toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'short'
      });
    }

    function fixUrl(url) {
      if (!url) return '';

      if (
        url.startsWith('http://') ||
        url.startsWith('https://')
      ) {
        return url;
      }

      return 'https://' + url;
    }

    function nl2br(text) {
      return (text || '').replace(/\n/g, '<br>');
    }

    async function exportPDF() {
      const button = document.querySelector('.pdf-btn');

      button.style.display = 'none';

      const element = document.getElementById('cv');

      await new Promise(r => setTimeout(r, 300));

      const opt = {
        margin: 10,
        filename: 'cv.pdf',
        image: {
          type: 'jpeg',
          quality: 0.98
        },
        html2canvas: {
          scale: 1.5,
          useCORS: true,
          scrollY: 0
        },
        jsPDF: {
          unit: 'mm',
          format: 'a4',
          orientation: 'portrait'
        },
        pagebreak: {
          mode: ['css', 'legacy']
        }
      };

      await html2pdf()
        .set(opt)
        .from(element)
        .save();

      button.style.display = 'block';
    }

    async function loadCV() {
      try {
        const res = await fetch('cv.json');

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const data = await res.json();

        const social = (data.socialMedia || [])
          .filter(s => s.link)
          .map(s => `
            <a href="${fixUrl(s.link)}" target="_blank">
              ${s.socialMedia}
            </a>
          `)
          .join('');

        const work = (data.workExperience || [])
          .filter(w => w.company || w.position)
          .map(job => `
            <div class="item">
              <h3>${job.position || ''} — ${job.company || ''}</h3>

              <div class="dates">
                ${formatDate(job.startYear)} - ${formatDate(job.endYear)}
              </div>

              ${
                job.description
                  ? `<p>${nl2br(job.description)}</p>`
                  : ''
              }

              ${
                Array.isArray(job.keyAchievements) &&
                job.keyAchievements.length
                  ? `
                    <ul>
                      ${job.keyAchievements
                        .map(a => `<li>${nl2br(a)}</li>`)
                        .join('')}
                    </ul>
                  `
                  : ''
              }
            </div>
          `)
          .join('');

        const education = (data.education || [])
          .filter(e => e.school || e.degree)
          .map(e => `
            <div class="item">
              <h3>${e.degree || ''}</h3>

              <p>${e.school || ''}</p>

              <div class="dates">
                ${formatDate(e.startYear)} - ${formatDate(e.endYear)}
              </div>
            </div>
          `)
          .join('');

        const skills = (data.skills || [])
          .filter(group =>
            Array.isArray(group.skills) &&
            group.skills.some(skill => skill.trim())
          )
          .map(group => `
            <div class="item">
              <h3>${group.title}</h3>

              <div class="tags">
                ${group.skills
                  .filter(skill => skill.trim())
                  .map(skill => `
                    <span class="tag">
                      ${skill.trim()}
                    </span>
                  `)
                  .join('')}
              </div>
            </div>
          `)
          .join('');

        const projects = (data.projects || [])
          .filter(p => p.name || p.description)
          .map(project => `
            <div class="item">
              <h3>${project.name || ''}</h3>

              ${
                project.description
                  ? `<p>${nl2br(project.description)}</p>`
                  : ''
              }
            </div>
          `)
          .join('');

        const languages = (data.languages || [])
          .filter(lang =>
            typeof lang === 'string'
              ? lang.trim()
              : lang.language
          )
          .map(lang =>
            typeof lang === 'string'
              ? `<span class="tag">${lang}</span>`
              : `
                <span class="tag">
                  ${lang.language}
                  ${lang.level ? ` (${lang.level})` : ''}
                </span>
              `
          )
          .join('');

        const certs = (data.certifications || [])
          .filter(cert =>
            typeof cert === 'string'
              ? cert.trim()
              : cert.name
          )
          .map(cert =>
            typeof cert === 'string'
              ? `<li>${cert}</li>`
              : `
                <li>
                  ${cert.name}
                  ${cert.year ? ` (${cert.year})` : ''}
                </li>
              `
          )
          .join('');

        document.getElementById('cv').innerHTML = `
          <div class="header">

            ${
              data.profilePicture
                ? `
                  <img
                    class="avatar"
                    src="${data.profilePicture}"
                    alt="${data.name}"
                  >
                `
                : ''
            }

            <div class="main-info">

              <div class="name-row">
                <h1>${data.name || ''}</h1>

                ${
                  data.position
                    ? `
                      <span class="position">
                        ${data.position}
                      </span>
                    `
                    : ''
                }
              </div>

              <div class="contact-row">

                ${
                  data.email
                    ? `
                      <a href="mailto:${data.email}">
                        Email
                      </a>
                    `
                    : ''
                }

                ${
                  data.contactInformation
                    ? `
                      <a href="tel:${data.contactInformation}">
                        Phone
                      </a>
                    `
                    : ''
                }

                ${
                  data.address
                    ? `<span>${data.address}</span>`
                    : ''
                }

                ${social}

              </div>
            </div>
          </div>

          ${
            section(
              "Summary",
              `<p>${nl2br(data.summary || '')}</p>`
            )
          }

          ${section("Work Experience", work)}

          ${section("Education", education)}

          ${section("Skills", skills)}

          ${section("Projects", projects)}

          ${
            section(
              "Languages",
              languages
                ? `<div class="tags">${languages}</div>`
                : ''
            )
          }

          ${
            section(
              "Certifications",
              certs
                ? `<ul>${certs}</ul>`
                : ''
            )
          }
        `;

      } catch (err) {
        console.error(err);

        document.getElementById('cv').innerHTML = `
          Failed to load CV:
          ${err.message}
        `;
      }
    }

    loadCV();
  </script>

</body>
</html>
