<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV Viewer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
      background: #f5f5f5;
      color: #222;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1, h2 {
      margin-bottom: 10px;
    }

    h2 {
      margin-top: 30px;
      border-bottom: 2px solid #eee;
      padding-bottom: 6px;
    }

    .header {
      display: flex;
      gap: 24px;
      align-items: center;
      flex-wrap: wrap;
    }

    .header img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      background: #eef2ff;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 14px;
    }

    .item {
      margin-bottom: 20px;
    }

    .dates {
      color: #666;
      font-size: 14px;
    }

    a {
      color: #2563eb;
      text-decoration: none;
    }

    ul {
      padding-left: 20px;
    }

    pre {
      white-space: pre-wrap;
      font-family: inherit;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="card" id="cv">Loading...</div>

  <script>
    async function loadCV() {
      const response = await fetch('cv.json');
      const data = await response.json();

      const cv = document.getElementById('cv');

      const formatDate = (date) => {
        if (!date) return 'Present';
        return new Date(date).toLocaleDateString('en-US', {
          year: 'numeric',
          month: 'short'
        });
      };

      const socialLinks = (data.socialMedia || [])
        .filter(s => s.link)
        .map(s => `<a href="${s.link}" target="_blank">${s.socialMedia}</a>`)
        .join(' | ');

      const workExperience = (data.workExperience || [])
        .map(job => {
          const achievements = Array.isArray(job.keyAchievements)
            ? job.keyAchievements.map(a => `<li>${a}</li>`).join('')
            : '';

          return `
            <div class="item">
              <h3>${job.position} — ${job.company}</h3>
              <div class="dates">
                ${formatDate(job.startYear)} - ${formatDate(job.endYear)}
              </div>
              <p>${job.description || ''}</p>
              ${achievements ? `<ul>${achievements}</ul>` : ''}
            </div>
          `;
        })
        .join('');

      const education = (data.education || [])
        .map(item => `
          <div class="item">
            <h3>${item.degree}</h3>
            <p>${item.school}</p>
            <div class="dates">
              ${formatDate(item.startYear)} - ${formatDate(item.endYear)}
            </div>
          </div>
        `)
        .join('');

      const skills = (data.skills || [])
        .map(group => `
          <div class="item">
            <h3>${group.title}</h3>
            <div class="tags">
              ${(group.skills || [])
                .map(skill => `<span class="tag">${skill.trim()}</span>`)
                .join('')}
            </div>
          </div>
        `)
        .join('');

      const projects = (data.projects || [])
        .map(project => `
          <div class="item">
            <h3>${project.name}</h3>
            <p>${project.description || ''}</p>
          </div>
        `)
        .join('');

      const languages = (data.languages || [])
        .map(lang =>
          typeof lang === 'string'
            ? `<span class="tag">${lang}</span>`
            : `<span class="tag">${lang.language} (${lang.level})</span>`
        )
        .join('');

      const certifications = (data.certifications || [])
        .map(cert =>
          typeof cert === 'string'
            ? `<li>${cert}</li>`
            : `<li>${cert.name} ${cert.year ? '(' + cert.year + ')' : ''}</li>`
        )
        .join('');

      cv.innerHTML = `
        <div class="header">
          ${data.profilePicture
            ? `<img src="${data.profilePicture}" alt="${data.name}">`
            : ''}
          <div>
            <h1>${data.name}</h1>
            <p><strong>${data.position}</strong></p>
            <p>${data.email}</p>
            <p>${data.contactInformation}</p>
            <p>${data.address}</p>
            <p>${socialLinks}</p>
          </div>
        </div>

        <h2>Summary</h2>
        <pre>${data.summary || ''}</pre>

        <h2>Work Experience</h2>
        ${workExperience}

        <h2>Education</h2>
        ${education}

        <h2>Skills</h2>
        ${skills}

        ${projects ? `
          <h2>Projects</h2>
          ${projects}
        ` : ''}

        ${languages ? `
          <h2>Languages</h2>
          <div class="tags">${languages}</div>
        ` : ''}

        ${certifications ? `
          <h2>Certifications</h2>
          <ul>${certifications}</ul>
        ` : ''}
      `;
    }

    loadCV().catch(error => {
      document.getElementById('cv').innerHTML =
        '<p>Failed to load CV data.</p>';
      console.error(error);
    });
  </script>
</body>
</html>
