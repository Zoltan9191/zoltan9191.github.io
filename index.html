<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CV Viewer</title>

  <!-- PDF lib -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
      background: #f5f5f5;
      color: #222;
    }

    .card {
      background: white;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1, h2 { margin: 0; }

    h2 {
      margin-top: 28px;
      padding-bottom: 6px;
      border-bottom: 2px solid #eee;
    }

    /* HEADER */
    .header {
      display: flex;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .avatar {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      object-fit: cover;
    }

    .main-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .name-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }

    .name-row h1 {
      font-size: 24px;
    }

    .position {
      font-size: 13px;
      padding: 3px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
    }

    .contact-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 13px;
    }

    .contact-row a,
    .contact-row span {
      background: #f3f4f6;
      padding: 4px 8px;
      border-radius: 8px;
      text-decoration: none;
      color: #444;
    }

    .contact-row a:hover {
      background: #e5e7eb;
    }

    /* CONTENT */
    .item { margin-bottom: 18px; }

    .dates {
      font-size: 13px;
      color: #666;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      background: #eef2ff;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 13px;
    }

    ul { padding-left: 18px; }

    pre {
      white-space: pre-wrap;
      margin: 0;
      font-family: inherit;
    }

    a { color: #2563eb; }

    /* FLOATING PDF BUTTON */
    .pdf-btn {
      position: fixed;
      right: 20px;
      bottom: 20px;
      background: #111827;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      z-index: 999;
    }

    .pdf-btn:hover {
      background: #374151;
    }

    /* HIDE BUTTON IN PDF */
    @media print {
      .pdf-btn {
        display: none !important;
      }
    }
  </style>
</head>

<body>

  <div class="card" id="cv">Loading...</div>

  <!-- FLOATING BUTTON -->
  <button class="pdf-btn" onclick="exportPDF()">Download PDF</button>

  <script>
    function section(title, content) {
      if (!content || content.trim().length === 0) return '';
      return `<h2>${title}</h2>${content}`;
    }

    function formatDate(date) {
      if (!date) return 'Present';
      return new Date(date).toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'short'
      });
    }

    function fixUrl(url) {
      if (!url) return '';
      if (url.startsWith('http://') || url.startsWith('https://')) return url;
      return 'https://' + url;
    }

    /* PDF EXPORT */
    async function exportPDF() {
      const button = document.querySelector('.pdf-btn');
      button.style.display = 'none';
    
      const element = document.getElementById('cv');
    
      // FIX: wait for layout reflow
      await new Promise(r => setTimeout(r, 300));
    
      const opt = {
        margin: [10, 10, 10, 10],
        filename: 'cv.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: {
          scale: 2,
          useCORS: true,
          scrollY: 0,      //FIX empty top
          windowWidth: element.scrollWidth
        },
        jsPDF: {
          unit: 'pt',
          format: 'a4',
          orientation: 'portrait'
        },
        pagebreak: {
          mode: ['css', 'legacy'] //FIX section cutting
        }
      };
    
      await html2pdf()
        .set(opt)
        .from(element)
        .save();
    
      button.style.display = 'block';
    }

    async function loadCV() {
      try {
        const res = await fetch('cv.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();

        const social = (data.socialMedia || [])
          .filter(s => s.link)
          .map(s => `<a href="${fixUrl(s.link)}" target="_blank">${s.socialMedia}</a>`)
          .join('');

        const work = (data.workExperience || [])
          .map(job => `
            <div class="item">
              <h3>${job.position} — ${job.company}</h3>
              <div class="dates">
                ${formatDate(job.startYear)} - ${formatDate(job.endYear)}
              </div>
              <p>${job.description || ''}</p>
              ${
                Array.isArray(job.keyAchievements) && job.keyAchievements.length
                  ? `<ul>${job.keyAchievements.map(a => `<li>${a}</li>`).join('')}</ul>`
                  : ''
              }
            </div>
          `).join('');

        const education = (data.education || [])
          .map(e => `
            <div class="item">
              <h3>${e.degree}</h3>
              <p>${e.school}</p>
              <div class="dates">
                ${formatDate(e.startYear)} - ${formatDate(e.endYear)}
              </div>
            </div>
          `).join('');

        const skills = (data.skills || [])
          .filter(g => Array.isArray(g.skills) && g.skills.some(s => s.trim()))
          .map(g => `
            <div class="item">
              <h3>${g.title}</h3>
              <div class="tags">
                ${g.skills.filter(s => s.trim()).map(s => `<span class="tag">${s}</span>`).join('')}
              </div>
            </div>
          `).join('');

        const projects = (data.projects || [])
          .map(p => `
            <div class="item">
              <h3>${p.name}</h3>
              <p>${p.description || ''}</p>
            </div>
          `).join('');

        const languages = (data.languages || [])
          .map(l =>
            typeof l === 'string'
              ? `<span class="tag">${l}</span>`
              : `<span class="tag">${l.language}${l.level ? ` (${l.level})` : ''}</span>`
          ).join('');

        const certs = (data.certifications || [])
          .map(c =>
            typeof c === 'string'
              ? `<li>${c}</li>`
              : `<li>${c.name}${c.year ? ` (${c.year})` : ''}</li>`
          ).join('');

        document.getElementById('cv').innerHTML = `
          <div class="header">
            ${data.profilePicture ? `<img class="avatar" src="${data.profilePicture}">` : ''}

            <div class="main-info">
              <div class="name-row">
                <h1>${data.name}</h1>
                <span class="position">${data.position}</span>
              </div>

              <div class="contact-row">
                ${data.email ? `<a href="mailto:${data.email}">Email</a>` : ''}
                ${data.contactInformation ? `<a href="tel:${data.contactInformation}">Phone</a>` : ''}
                ${data.address ? `<span>${data.address}</span>` : ''}
                ${social}
              </div>
            </div>
          </div>

          ${section("Summary", `<pre>${data.summary || ''}</pre>`)}
          ${section("Work Experience", work)}
          ${section("Education", education)}
          ${section("Skills", skills)}
          ${section("Projects", projects)}
          ${section("Languages", languages ? `<div class="tags">${languages}</div>` : '')}
          ${section("Certifications", certs ? `<ul>${certs}</ul>` : '')}
        `;

      } catch (err) {
        document.getElementById('cv').innerHTML =
          `Failed to load CV: ${err.message}`;
      }
    }

    loadCV();
  </script>

</body>
</html>
