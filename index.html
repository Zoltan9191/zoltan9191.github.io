<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CV Viewer</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
      background: #f5f5f5;
      color: #222;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1, h2 { margin-bottom: 10px; }

    h2 {
      margin-top: 30px;
      border-bottom: 2px solid #eee;
      padding-bottom: 6px;
    }

    .header {
      display: flex;
      gap: 24px;
      align-items: center;
      flex-wrap: wrap;
    }

    .header img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      background: #eef2ff;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 14px;
    }

    .item { margin-bottom: 20px; }

    .dates {
      color: #666;
      font-size: 14px;
    }

    a {
      color: #2563eb;
      text-decoration: none;
    }

    pre {
      white-space: pre-wrap;
      font-family: inherit;
      margin: 0;
    }
  </style>
</head>

<body>
  <div class="card" id="cv">Loading...</div>

  <script>
    function section(title, content) {
      if (!content || content.trim().length === 0) return '';
      return `<h2>${title}</h2>${content}`;
    }

    function formatDate(date) {
      if (!date) return 'Present';
      return new Date(date).toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'short'
      });
    }

    async function loadCV() {
      try {
        const res = await fetch('cv.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();

        const social = (data.socialMedia || [])
          .filter(s => s.link)
          .map(s => `<a href="${s.link}" target="_blank">${s.socialMedia}</a>`)
          .join(' | ');

        const work = (data.workExperience || [])
          .filter(w => w.company || w.position)
          .map(job => `
            <div class="item">
              <h3>${job.position} — ${job.company}</h3>
              <div class="dates">
                ${formatDate(job.startYear)} - ${formatDate(job.endYear)}
              </div>
              <p>${job.description || ''}</p>
              ${
                Array.isArray(job.keyAchievements) && job.keyAchievements.length
                  ? `<ul>${job.keyAchievements.map(a => `<li>${a}</li>`).join('')}</ul>`
                  : ''
              }
            </div>
          `)
          .join('');

        const education = (data.education || [])
          .filter(e => e.school || e.degree)
          .map(e => `
            <div class="item">
              <h3>${e.degree}</h3>
              <p>${e.school}</p>
              <div class="dates">
                ${formatDate(e.startYear)} - ${formatDate(e.endYear)}
              </div>
            </div>
          `)
          .join('');

        const skills = (data.skills || [])
          .filter(g =>
            Array.isArray(g.skills) &&
            g.skills.some(s => s.trim())
          )
          .map(g => `
            <div class="item">
              <h3>${g.title}</h3>
              <div class="tags">
                ${g.skills
                  .filter(s => s.trim())
                  .map(s => `<span class="tag">${s.trim()}</span>`)
                  .join('')}
              </div>
            </div>
          `)
          .join('');

        const projects = (data.projects || [])
          .filter(p => p.name || p.description)
          .map(p => `
            <div class="item">
              <h3>${p.name}</h3>
              <p>${p.description || ''}</p>
            </div>
          `)
          .join('');

        const languages = (data.languages || [])
          .filter(l => typeof l === 'string' ? l.trim() : l.language)
          .map(l =>
            typeof l === 'string'
              ? `<span class="tag">${l}</span>`
              : `<span class="tag">${l.language}${l.level ? ` (${l.level})` : ''}</span>`
          )
          .join('');

        const certs = (data.certifications || [])
          .filter(c => typeof c === 'string' ? c.trim() : c.name)
          .map(c =>
            typeof c === 'string'
              ? `<li>${c}</li>`
              : `<li>${c.name}${c.year ? ` (${c.year})` : ''}</li>`
          )
          .join('');

        const html = `
          <div class="header">
            ${data.profilePicture ? `<img src="${data.profilePicture}" />` : ''}
            <div>
              <h1>${data.name}</h1>
              <p><strong>${data.position}</strong></p>
              <p>${data.email || ''}</p>
              <p>${data.contactInformation || ''}</p>
              <p>${data.address || ''}</p>
              <p>${social}</p>
            </div>
          </div>

          ${section("Summary", `<pre>${data.summary || ''}</pre>`)}
          ${section("Work Experience", work)}
          ${section("Education", education)}
          ${section("Skills", skills)}
          ${section("Projects", projects)}
          ${section("Languages", languages ? `<div class="tags">${languages}</div>` : '')}
          ${section("Certifications", certs ? `<ul>${certs}</ul>` : '')}
        `;

        document.getElementById('cv').innerHTML = html;

      } catch (err) {
        console.error(err);
        document.getElementById('cv').innerHTML =
          `<p>Failed to load CV data: ${err.message}</p>`;
      }
    }

    loadCV();
  </script>
</body>
</html>
